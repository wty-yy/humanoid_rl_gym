policy_path: "{LEGGED_GYM_ROOT_DIR}/deploy/pre_train/g1/g1_cts_v0.0.3_22k.pt"

xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/g1/scene_29dof.xml"

# Total simulation time
simulation_duration: 60000000.0
# Simulation time step (sim.dt in base config)
simulation_dt: 0.005
# Controller update frequency (simulation_dt * control_decimation = 0.02s; 50Hz)
control_decimation: 4

# Gait phase cycle time [s] (commands.gait_phase)
gait_phase: 0.64

# PD gains per joint (29 DOFs, ordered as URDF)
# Joint order:
#   left_hip_pitch, left_hip_roll, left_hip_yaw, left_knee, left_ankle_pitch, left_ankle_roll,
#   right_hip_pitch, right_hip_roll, right_hip_yaw, right_knee, right_ankle_pitch, right_ankle_roll,
#   waist_yaw, waist_roll, waist_pitch,
#   left_shoulder_pitch, left_shoulder_roll, left_shoulder_yaw, left_elbow, left_wrist_roll, left_wrist_pitch, left_wrist_yaw,
#   right_shoulder_pitch, right_shoulder_roll, right_shoulder_yaw, right_elbow, right_wrist_roll, right_wrist_pitch, right_wrist_yaw
kps: [
  40.1792, 99.0984, 40.1792, 99.0984, 28.5012, 28.5012,    # left leg
  40.1792, 99.0984, 40.1792, 99.0984, 28.5012, 28.5012,    # right leg
  40.1792, 28.5012, 28.5012,                               # waist
  50.0, 50.0, 50.0, 14.2506, 14.2506, 16.7783, 16.7783,    # left arm
  50.0, 50.0, 50.0, 14.2506, 14.2506, 16.7783, 16.7783     # right arm
]
kds: [
  2.5579, 6.3088, 2.5579, 6.3088, 1.8144, 1.8144,          # left leg
  2.5579, 6.3088, 2.5579, 6.3088, 1.8144, 1.8144,          # right leg
  2.5579, 1.8144, 1.8144,                                  # waist
  0.9072, 0.9072, 0.9072, 0.9072, 0.9072, 1.0681, 1.0681,  # left arm
  0.9072, 0.9072, 0.9072, 0.9072, 0.9072, 1.0681, 1.0681   # right arm
]

# Default joint angles [rad] (init_state.default_joint_angles)
default_angles: [
  -0.1, 0.0, 0.0, 0.3, -0.2, 0.0,                          # left leg
  -0.1, 0.0, 0.0, 0.3, -0.2, 0.0,                          # right leg
  0.0, 0.0, 0.0,                                           # waist
  0.0, 0.25, 0.0, 0.97, 0.15, 0.0, 0.0,                    # left arm
  0.0, -0.25, 0.0, 0.97, -0.15, 0.0, 0.0                   # right arm
]

# Observation normalization scales (normalization.obs_scales)
lin_vel_scale: 2.0
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]

# ang_vel(3) + gravity(3) + commands(3) + dof_pos(29) + dof_vel(29) + previous_actions(29) + gait_phase(2)
num_actions: 29
num_obs: 98

max_cmd: [2.0, 0.5, 1.5]
cmd_init: [0.3, 0.0, 0.0]

